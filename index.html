<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>全国散策マップ — ハイキング・ウォーキングコース診断</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@800&family=Shippori+Mincho+B1:wght@700;800&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html{height:100%;overflow:hidden}
    body{height:100%;overflow:hidden;font-family:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;display:flex;background:#d8d2c8}
    .hidden{display:none!important}

    /* ========== MAIN MAP ========== */
    #main-map{flex:1;height:100vh;z-index:1}

    /* ========== SIDEBAR (PC) ========== */
    .sidebar{width:380px;height:100vh;background:#f5f0e8;display:flex;flex-direction:column;box-shadow:3px 0 28px rgba(15,28,20,.16);z-index:10;flex-shrink:0;transition:margin-left .3s cubic-bezier(.4,0,.2,1);position:relative}
    .sidebar.collapsed{margin-left:-380px}
    .sidebar-header{padding:14px 18px;background:linear-gradient(160deg,#13201a 0%,#1d3226 100%);color:#c4dac4;display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative;overflow:hidden}
    .sidebar-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(90,160,110,.5) 35%,rgba(110,180,130,.6) 65%,transparent);pointer-events:none}
    .sidebar-title{font-size:15px;font-weight:700;flex:1;font-family:"Shippori Mincho B1",serif;letter-spacing:.05em}
    .sidebar-logo{height:30px;width:auto;flex:1;display:block}
    .sidebar-toggle{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.16);color:rgba(255,255,255,.6);width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
    .sidebar-toggle:hover{background:rgba(255,255,255,.2);color:#fff;border-color:rgba(255,255,255,.3)}
    .sidebar-drag{display:none;-webkit-user-select:none;user-select:none}
    .sidebar-body{flex:1;overflow-y:auto;overflow-x:hidden;background:#f5f0e8}
    /* sidebar re-open button on map */
    .sidebar-reopen{position:fixed;top:60px;left:12px;z-index:20;background:linear-gradient(160deg,#13201a,#1d3226);color:#c4dac4;border:none;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 3px 14px rgba(15,28,20,.35);display:none;letter-spacing:.04em}

    /* ========== SIDEBAR VIEWS ========== */
    .sb-view{padding:16px;animation:fadeIn .25s ease}
    #sb-landing{padding:0}
    .sb-view.hidden{display:none!important}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

    /* ========== LANDING VIEW ========== */
    .sb-hero{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid #d8d2c8;background:linear-gradient(135deg,#eaf2ea 0%,#e2ece4 100%);position:relative;overflow:hidden}
    .sb-hero::after{content:'';position:absolute;right:-8px;top:-8px;width:72px;height:72px;background:radial-gradient(circle,rgba(60,110,80,.12) 0%,transparent 70%);pointer-events:none}
    .sb-hero-text{flex:1;font-size:11px;color:#5a554c;line-height:1.6}
    .sb-hero-text strong{color:#13201a;font-size:13px;font-family:"Shippori Mincho B1",serif;font-weight:700;letter-spacing:.04em;display:block;margin-bottom:2px}
    .btn-diag{background:linear-gradient(160deg,#13201a,#265040);color:#cce0cc;border:none;padding:9px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;box-shadow:0 3px 12px rgba(19,32,26,.3);transition:all .2s;white-space:nowrap;flex-shrink:0;letter-spacing:.04em}
    .btn-diag:hover{box-shadow:0 5px 18px rgba(19,32,26,.45);transform:translateY(-2px)}

    /* ========== FILTERS ========== */
    .sb-filters{padding:14px 16px;border-bottom:1px solid #d8d2c8;background:#f5f0e8}
    .filter-group{margin-bottom:10px}
    .filter-group:last-child{margin-bottom:0}
    .filter-label{font-size:10px;font-weight:700;color:#8a8378;display:block;margin-bottom:6px;letter-spacing:.08em;text-transform:uppercase}
    .filter-btns{display:flex;flex-wrap:wrap;gap:5px}
    .fbtn{padding:5px 12px;border:1.5px solid #ccc6bc;border-radius:20px;background:#faf8f4;font-size:11px;color:#5a554c;cursor:pointer;transition:all .15s;font-weight:600}
    .fbtn:hover{border-color:#478060;background:#eaf2ec;color:#265040}
    .fbtn.active{border-color:#265040;background:#265040;color:#cce0cc;box-shadow:0 1px 5px rgba(38,80,64,.25)}
    .filter-count{font-size:11px;color:#8a8378;padding:6px 16px 0;text-align:right;letter-spacing:.02em}

    /* ========== SEARCH ========== */
    .sb-search{padding:10px 16px;border-bottom:1px solid #d8d2c8;background:#f5f0e8}
    .search-box{display:flex;align-items:center;gap:6px;background:#faf8f4;border:1.5px solid #ccc6bc;border-radius:10px;padding:8px 12px;transition:all .2s}
    .geo-ctrl{background:#faf8f4;width:40px;height:40px;border-radius:8px;box-shadow:0 1px 6px rgba(19,32,26,.18);display:flex;align-items:center;justify-content:center;cursor:pointer;border:1.5px solid #ccc6bc;font-size:18px;line-height:1;color:#5a554c;transition:all .2s;padding:0}
    .geo-ctrl:hover{background:#eaf2ec;color:#265040;border-color:#478060}
    .geo-ctrl.geo-active{color:#1e5c99;border-color:#4a8ec4;background:#eaf0f8}
    .geo-ctrl.geo-active::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:5px;height:5px;background:#1e5c99;border-radius:50%}
    .geo-ctrl.geo-loading{color:#b0a898;pointer-events:none}
    .geo-ctrl.geo-error{color:#c44040;border-color:#e08080}
    .geo-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(19,32,26,.88);color:#c4dac4;padding:8px 18px;border-radius:10px;font-size:13px;z-index:10000;pointer-events:none;opacity:0;transition:opacity .3s;backdrop-filter:blur(4px)}
    .geo-toast.show{opacity:1}
    .geo-marker{position:relative;width:20px;height:20px}
    .geo-marker-dot{position:absolute;top:50%;left:50%;width:16px;height:16px;margin:-8px 0 0 -8px;background:#1e5c99;border:2.5px solid #fff;border-radius:50%;box-shadow:0 0 8px rgba(30,92,153,.5),0 1px 4px rgba(0,0,0,.35);z-index:2}
    .geo-marker-dot.approx{background:#4a6cb5}
    .geo-marker-pulse{position:absolute;top:50%;left:50%;width:18px;height:18px;margin:-9px 0 0 -9px;background:rgba(30,92,153,.48);border:2px solid rgba(30,92,153,.32);border-radius:50%;z-index:1;animation:geo-pulse 1.8s ease-out infinite}
    .geo-marker-pulse2{position:absolute;top:50%;left:50%;width:18px;height:18px;margin:-9px 0 0 -9px;background:rgba(30,92,153,.32);border-radius:50%;z-index:1;animation:geo-pulse 1.8s ease-out .9s infinite}
    .geo-marker-pulse.approx,.geo-marker-pulse2.approx{background:rgba(74,108,181,.4);border-color:rgba(74,108,181,.3)}
    @keyframes geo-pulse{0%{transform:scale(1);opacity:1}70%{opacity:.3}100%{transform:scale(5);opacity:0}}
    .search-box:focus-within{border-color:#265040;background:#fff;box-shadow:0 0 0 3px rgba(38,80,64,.08)}
    .search-icon{font-size:14px;flex-shrink:0;opacity:.55}
    #search-input{flex:1;border:none;background:transparent;font-size:13px;outline:none;color:#1c1a16;font-family:inherit;min-width:0}
    #search-input::placeholder{color:#b0a898}
    .search-clear{background:none;border:none;color:#b0a898;font-size:13px;cursor:pointer;padding:0 2px;flex-shrink:0;transition:color .15s}
    .search-clear:hover{color:#5a554c}
    .sb-ccard-match{padding:3px 10px 5px;font-size:10px;color:#c47038;background:#fef6ee;border-top:1px solid #f0dcc8}
    .sb-ccard-dist{color:#1e5c99;font-weight:600;font-size:11px}

    /* ========== SEARCH PRESETS ========== */
    .sb-presets{padding:12px 16px;border-bottom:1px solid #d8d2c8;background:#f5f0e8}
    .preset-cat{margin-bottom:10px}
    .preset-cat:last-child{margin-bottom:0}
    .preset-cat-name{font-size:10px;font-weight:700;color:#8a8378;margin-bottom:6px;display:flex;align-items:center;gap:4px;letter-spacing:.06em}
    .preset-btns{display:flex;flex-wrap:wrap;gap:4px}
    .preset-btn{padding:4px 10px;border:1.5px solid #d4cec4;border-radius:16px;background:#faf8f4;font-size:11px;color:#5a554c;cursor:pointer;transition:all .15s;white-space:nowrap}
    .preset-btn:hover{border-color:#478060;background:#eaf2ec;color:#265040}
    .preset-btn.active{border-color:#265040;background:#e4ede6;color:#13201a;font-weight:700}

    /* ========== COURSE LIST ========== */
    .sb-course-list{padding:8px 12px}
    .sb-ccard{border:1px solid #d8d2c8;border-radius:10px;overflow:hidden;cursor:pointer;transition:all .18s;margin-bottom:8px;background:#faf8f4}
    .sb-ccard:hover{box-shadow:0 4px 14px rgba(19,32,26,.1);border-color:#478060;transform:translateY(-1px)}
    .sb-ccard.highlighted{border-color:#265040;box-shadow:0 0 0 2px rgba(38,80,64,.2),0 4px 12px rgba(38,80,64,.1)}
    .sb-ccard-h{padding:8px 10px;color:#fff;display:flex;justify-content:space-between;align-items:center}
    .sb-ccard-h h4{font-size:12px;font-weight:700;flex:1;margin-right:6px;letter-spacing:.02em}
    .sb-ccard-h .eq-tag{font-size:10px;background:rgba(255,255,255,.2);padding:2px 7px;border-radius:4px;white-space:nowrap}
    .sb-ccard-b{padding:6px 10px;font-size:11px;color:#6b6460;display:flex;gap:8px;flex-wrap:wrap}
    .sb-ccard-b span{white-space:nowrap}
    .sb-ccard-desc{padding:4px 10px 8px;font-size:11px;color:#5a554c;line-height:1.6;border-top:1px solid #e8e2d8}
    .sb-ccard-bm{background:none;border:none;cursor:pointer;line-height:1;padding:2px 0 2px 4px;flex-shrink:0;transition:transform .15s;-webkit-user-select:none;user-select:none}
    .sb-ccard-bm:active{transform:scale(1.3)}
    .sb-ccard-bm svg{width:16px;height:16px;fill:none;stroke:rgba(255,255,255,.55);stroke-width:2}
    .sb-ccard-bm.saved svg{fill:#8b63d4;stroke:#8b63d4}
    .sb-more{text-align:center;color:#b0a898;font-size:11px;padding:10px}
    /* popup bookmark button */
    .popup-bm-btn{display:inline-flex;align-items:center;gap:3px;padding:5px 12px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #d8d2c8;background:#faf8f4;color:#5a554c;transition:all .15s;box-sizing:border-box}
    .popup-bm-btn:hover{border-color:#7c55cc;color:#7c55cc;background:#f8f4fc}
    .popup-bm-btn.saved{background:#ede7f6;border-color:#7c55cc;color:#5a30a8}
    .popup-bm-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;flex-shrink:0}
    .popup-bm-btn.saved svg{fill:#7c55cc;stroke:#7c55cc}
    .popup-more-menu.show{display:block!important}
    /* bookmarked marker icon */
    .bm-marker-icon{display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 1px 4px rgba(0,0,0,.4))}
    .bm-marker-icon svg{width:22px;height:22px;fill:#7c55cc;stroke:#fff;stroke-width:1.5}

    /* ========== MAP LEGEND (on map) ========== */
    .map-legend-ctrl{display:flex;gap:8px;background:rgba(250,248,244,.92);padding:6px 12px;border-radius:10px;box-shadow:0 2px 10px rgba(19,32,26,.14);font-size:11px;color:#5a554c;backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.7)}
    .map-legend-ctrl .ld{display:flex;align-items:center;gap:3px}
    .map-legend-ctrl .ldot{width:10px;height:10px;border-radius:50%;border:1.5px solid rgba(255,255,255,.9);box-shadow:0 1px 3px rgba(0,0,0,.25)}

    /* ========== QUIZ / PREF SELECTOR ========== */
    .sb-back{background:none;border:none;color:#265040;font-size:13px;font-weight:600;cursor:pointer;padding:0 0 10px;display:inline-flex;align-items:center;gap:4px;transition:color .15s;letter-spacing:.02em}
    .sb-back:hover{color:#13201a}
    .pref-sec{padding:4px 0}
    .q-num{display:inline-block;background:#e4ede6;color:#265040;font-size:10px;font-weight:700;padding:3px 12px;border-radius:12px;margin-bottom:8px;letter-spacing:.06em}
    .q-txt{font-size:15px;font-weight:700;color:#13201a;margin-bottom:14px;line-height:1.5;font-family:"Shippori Mincho B1",serif;letter-spacing:.04em}
    .pref-region{margin-bottom:14px}
    .pref-region-name{font-size:12px;font-weight:700;color:#265040;margin-bottom:6px;padding-left:2px;letter-spacing:.04em}
    .pref-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:5px}
    .pref-btn{padding:7px 4px;border:1.5px solid #d4cec4;border-radius:8px;background:#faf8f4;font-size:11px;color:#4a4540;cursor:pointer;text-align:center;transition:all .15s;font-weight:600}
    .pref-btn:hover{border-color:#478060;background:#eaf2ec;color:#265040}
    .pref-btn.selected{background:#265040;color:#cce0cc;border-color:#265040}

    .prog{margin-bottom:14px}
    .prog-top{display:flex;justify-content:space-between;font-size:11px;color:#8a8378;margin-bottom:5px}
    .prog-bar{height:4px;background:#d8d2c8;border-radius:2px;overflow:hidden}
    .prog-fill{height:100%;background:linear-gradient(90deg,#265040,#5a9a70);border-radius:2px;transition:width .3s}

    .opts{display:flex;flex-direction:column;gap:7px}
    .opt-btn{display:flex;align-items:center;gap:10px;padding:11px 14px;border:1.5px solid #d4cec4;border-radius:10px;background:#faf8f4;cursor:pointer;transition:all .2s;text-align:left;font-size:13px}
    .opt-btn:hover{border-color:#478060;background:#eaf2ec;transform:translateX(4px);box-shadow:0 2px 8px rgba(38,80,64,.1)}
    .oi{font-size:20px;flex-shrink:0}
    .ol{flex:1;color:#1c1a16}

    /* ========== RESULT VIEW ========== */
    .r-sec{padding:4px 0}
    .r-badge{display:inline-block;font-size:13px;font-weight:700;padding:5px 14px;border-radius:20px;margin-bottom:8px;letter-spacing:.04em;font-family:"Shippori Mincho B1",serif}
    .lv-entry{background:#e4ede6;color:#2a6830}
    .lv-beginner{background:#e4ede6;color:#2a6830}
    .lv-intermediate{background:#fef2e0;color:#bc620a}
    .lv-advanced{background:#fce6e0;color:#bc3a0a}
    .lv-expert{background:#ede6f8;color:#641c98}
    .r-region{font-size:14px;font-weight:700;color:#13201a;margin-bottom:6px;font-family:"Shippori Mincho B1",serif;letter-spacing:.04em}
    .r-sum{font-size:13px;color:#5a554c;line-height:1.7;margin-bottom:12px;padding:12px;background:#edf4ee;border-radius:10px;border-left:3px solid #478060}
    .r-sum p{margin:0}

    .cards{display:flex;flex-direction:column;gap:10px}
    .card{border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(19,32,26,.08);transition:all .2s;border:1px solid #d8d2c8;cursor:pointer;background:#faf8f4}
    .card:hover{box-shadow:0 6px 22px rgba(19,32,26,.14);transform:translateY(-2px)}
    .card-h{padding:10px 14px;color:#fff;display:flex;justify-content:space-between;align-items:center;border-radius:12px 12px 0 0}
    .card-h h3{font-size:14px;font-weight:700;flex:1;letter-spacing:.03em}
    .diff-tag{font-size:10px;background:rgba(255,255,255,.22);padding:2px 9px;border-radius:10px;white-space:nowrap}
    .niche-b,.stroll-b{font-size:10px;padding:1px 6px;border-radius:4px;margin-left:6px}
    .niche-b{background:rgba(200,50,50,.2);color:#f5a0a0}
    .stroll-b{background:rgba(0,120,100,.2);color:#a8e8e0}
    .now-tag{font-size:9px;background:#c47038;color:#fff;padding:2px 7px;border-radius:4px;margin-left:6px;animation:pulse 2s infinite;letter-spacing:.04em}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
    .card-b{padding:12px 14px}
    .c-meta{display:flex;flex-wrap:wrap;gap:8px;font-size:12px;color:#6b6460;margin-bottom:8px}
    .c-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
    .tag{font-size:10px;padding:2px 9px;border-radius:10px;font-weight:600;letter-spacing:.02em}
    .tag-highlight{background:#fef2e0;color:#bc620a}
    .tag-niche{background:#ede6f8;color:#741ca0}
    .tag-view{background:#e0eef8;color:#145898}
    .tag-nature{background:#e4ede6;color:#2a6830}
    .tag-season{background:#fce6f0;color:#bc2858}
    .tag-stroll{background:#ddf4f0;color:#006456}
    .c-desc{font-size:12px;color:#4a4540;line-height:1.7;margin-bottom:8px}
    .c-tips{font-size:11px;color:#6b6460;background:#f2ede5;padding:8px 12px;border-radius:8px;line-height:1.6;border-left:2px solid #ccc6bc}

    .season-indicator{margin-bottom:6px}
    .si-badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px}
    .si-highlight{background:#fef2e0;color:#bc620a}
    .si-best{background:#e4ede6;color:#2a6830}
    .si-ok{background:#f0ece6;color:#6b6460}
    .si-offseason{background:#ece8e2;color:#9e9890}
    .highlight-text{font-size:11px;color:#bc620a;margin-left:4px}

    .stroll-note,.nearby-note{font-size:12px;padding:10px;border-radius:8px;margin-bottom:4px}
    .stroll-note{background:#ddf4f0;color:#006456;border-left:2px solid #5abaac}
    .nearby-note{background:#e0eef8;color:#145898;border-left:2px solid #68aad8}

    .season-panel{border-radius:10px;overflow:hidden;margin-bottom:12px;border:1px solid #d8d2c8}
    .season-header{padding:12px 14px;display:flex;align-items:center;gap:10px;color:#fff}
    .spring-bg{background:linear-gradient(135deg,#cc6880,#b85070)}
    .summer-bg{background:linear-gradient(135deg,#2a9080,#1e766c)}
    .autumn-bg{background:linear-gradient(135deg,#cc7040,#b85228)}
    .winter-bg{background:linear-gradient(135deg,#5088c0,#3870b0)}
    .s-icon{font-size:22px}
    .s-title{font-size:13px;font-weight:700;letter-spacing:.04em;font-family:"Shippori Mincho B1",serif}
    .s-month{font-size:11px;opacity:.8}
    .season-body{padding:12px 14px;font-size:12px;color:#4a4540;line-height:1.7;background:#faf8f4}
    .season-summary{margin-bottom:6px}
    .season-warn{color:#bc3a0a;margin-bottom:6px}
    .season-recommend{color:#2a6830;margin-bottom:6px}
    .level-season-note{color:#145898;background:#e0eef8;padding:6px 10px;border-radius:6px;border-left:2px solid #68aad8}

    .btn-restart{display:block;width:100%;padding:11px;border:2px solid #265040;border-radius:10px;background:#faf8f4;color:#265040;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;transition:all .2s;letter-spacing:.04em}
    .btn-restart:hover{background:#265040;color:#cce0cc}

    /* ========== MAP CONTROLS (reused) ========== */
    .gmap-layer-ctrl{display:flex;gap:0;border-radius:10px;overflow:hidden;box-shadow:0 2px 10px rgba(19,32,26,.16);font-family:"Zen Kaku Gothic New","Noto Sans JP",sans-serif;border:1px solid rgba(255,255,255,.7);backdrop-filter:blur(4px)}
    .gmap-layer-btn{padding:7px 14px;font-size:12px;font-weight:600;border:none;cursor:pointer;color:#4a4540;background:rgba(250,248,244,.92);transition:all .15s;white-space:nowrap}
    .gmap-layer-btn:hover{background:rgba(234,242,236,.95);color:#265040}
    .gmap-layer-btn.active{background:rgba(228,237,230,.95);color:#13201a;border-bottom:2px solid #265040}
    .map-popup-title{font-size:14px;font-weight:700;color:#13201a;margin-bottom:4px;font-family:"Shippori Mincho B1",serif;letter-spacing:.04em}
    .map-popup-meta{font-size:12px;color:#6b6460;line-height:1.6}
    .map-popup-season{font-size:11px;margin-top:4px}
    /* season tooltip on circleMarkers */
    .season-tip{background:linear-gradient(135deg,#c47038,#d48038);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;border:none;box-shadow:0 2px 6px rgba(196,112,56,.4);white-space:nowrap;pointer-events:none;transition:none!important}
    .season-tip::before{border-top-color:#d48038}
    .leaflet-zooming .season-tip{opacity:0!important;transition:none!important}
    .leaflet-tooltip{transition:none!important}
    .season-pulse-wrap{pointer-events:none}

    /* ========== AI CONCIERGE ========== */

    .ai-chat-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;min-height:200px;max-height:380px;background:#faf8f4}

    .ai-msg-user{align-self:flex-end;background:linear-gradient(160deg,#13201a,#265040);color:#cce0cc;border-bottom-right-radius:4px;box-shadow:0 2px 8px rgba(19,32,26,.2)}

    .ai-chat-footer{padding:10px 12px;border-top:1px solid #e2dcd2;display:flex;gap:8px;flex-shrink:0;background:#f2ede5}

    .ai-key-overlay{position:fixed;inset:0;background:rgba(19,32,26,.45);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(4px)}

    @media(max-width:768px){
      .ai-fab{bottom:16px;right:16px;width:50px;height:50px}

    }
  </style>
</head>

<script>
/* SmoothWheelZoom — _move() based for true smooth zoom.
   Uses Leaflet's _move() for real rendering each frame (no CSS hack).
   Performance: updateVisibleMarkers is suppressed during zoom via
   window._smoothZooming flag, and runs once on wheel end. */
L.Map.mergeOptions({smoothWheelZoom:true,smoothSensitivity:3});
L.Map.SmoothWheelZoom=L.Handler.extend({
  addHooks:function(){L.DomEvent.on(this._map._container,'wheel',this._onWheelScroll,this);},
  removeHooks:function(){L.DomEvent.off(this._map._container,'wheel',this._onWheelScroll,this);},
  _forceStop:function(){
    if(this._zoomAnimationId){cancelAnimationFrame(this._zoomAnimationId);this._zoomAnimationId=null;}
    clearTimeout(this._timeoutId);
    if(this._moved){this._map._moveEnd(true);this._moved=false;}
    this._isWheeling=false;
    this._goalZoom=null;
    window._smoothZooming=false;
  },
  _onWheelScroll:function(e){
    if(!this._isWheeling) this._onWheelStart(e);
    this._onWheeling(e);
  },
  _onWheelStart:function(e){
    var map=this._map;
    this._isWheeling=true;
    window._smoothZooming=true;
    this._wheelMousePosition=map.mouseEventToContainerPoint(e);
    this._centerPoint=map.getSize()._divideBy(2);
    this._wheelStartLatLng=map.containerPointToLatLng(this._wheelMousePosition);
    this._moved=false;
    map._stop();
    if(map._panAnim) map._panAnim.stop();
    this._goalZoom=map.getZoom();
    this._zoomAnimationId=requestAnimationFrame(this._updateWheelZoom.bind(this));
  },
  _onWheeling:function(e){
    var map=this._map;
    this._goalZoom=this._goalZoom+L.DomEvent.getWheelDelta(e)*0.003*map.options.smoothSensitivity;
    if(this._goalZoom<map.getMinZoom()||this._goalZoom>map.getMaxZoom()){
      this._goalZoom=map._limitZoom(this._goalZoom);
    }
    this._wheelMousePosition=this._map.mouseEventToContainerPoint(e);
    clearTimeout(this._timeoutId);
    this._timeoutId=setTimeout(this._onWheelEnd.bind(this),200);
    L.DomEvent.preventDefault(e);
    L.DomEvent.stopPropagation(e);
  },
  _onWheelEnd:function(){
    this._isWheeling=false;
    window._smoothZooming=false;
    cancelAnimationFrame(this._zoomAnimationId);this._zoomAnimationId=null;
    if(this._moved){this._map._moveEnd(true);this._moved=false;}
  },
  _updateWheelZoom:function(){
    var map=this._map;
    if(!this._isWheeling){return;}
    var curZoom=map.getZoom();
    var newZoom=curZoom+(this._goalZoom-curZoom)*0.3;
    newZoom=Math.floor(newZoom*100)/100;
    if(Math.abs(newZoom-curZoom)<0.001){
      this._zoomAnimationId=requestAnimationFrame(this._updateWheelZoom.bind(this));
      return;
    }
    /* Recompute reference from CURRENT map state each frame so that
       external setView (panToMarker) changes are absorbed naturally */
    this._centerPoint=map.getSize()._divideBy(2);
    this._wheelStartLatLng=map.containerPointToLatLng(this._wheelMousePosition);
    var delta=this._wheelMousePosition.subtract(this._centerPoint);
    if(delta.x===0&&delta.y===0){
      /* Mouse at center — zoom around center */
      var center=map.getCenter();
    }else{
      var center=map.unproject(map.project(this._wheelStartLatLng,newZoom).subtract(delta),newZoom);
    }
    if(!this._moved){
      map._moveStart(true,false);
      this._moved=true;
    }
    map._move(center,newZoom);
    this._zoomAnimationId=requestAnimationFrame(this._updateWheelZoom.bind(this));
  }
});
L.Map.addInitHook('addHandler','smoothWheelZoom',L.Map.SmoothWheelZoom);
</script>

    {icon:"🗻",label:"頂上に立つ達成感を味わいたい",score:3},{icon:"🧭",label:"人の少ない静かな山域を歩きたい",score:4}]},

];

// ============ STATE ============
let selectedPref="",selectedRegion="";
let curQ=0,totalScore=0,answers={};
let mainMap=null,markerLayer=null,seasonPulseLayer=null;
let courseMarkerMap=new Map();
let allCoursesCache=null;
let activeFilters={equipment:"all",duration:"all"};
let searchKeyword="";
let searchDebounceTimer=null;
let filteredCourses=[];
let visibleUpdateTimer=null;
let sidebarState="landing";
let userLocation=null;
let userMarker=null;
let userAccuracyCircle=null;

// ============ EQUIPMENT & DURATION MAPPING ============
const EQUIPMENT_MAP={"散策":"casual","入門":"casual","初級":"hiking","中級":"hiking","中級〜上級":"hiking","上級":"hiking","エキスパート":"hiking"};
const EQ_LABELS={casual:"私服OK",hiking:"登山装備"};
const EQ_COLORS={casual:"#00796b",hiking:"#c62828"};

function getEquipmentCategory(diff){return EQUIPMENT_MAP[diff]||"hiking";}

function haversineKm(lat1,lng1,lat2,lng2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function formatDist(km){return km<1?`${Math.round(km*10)/10}km`:km<100?`${Math.round(km)}km`:`約${Math.round(km/10)*10}km`;}

function geoToast(msg){
  const t=document.getElementById('geo-toast');if(!t)return;
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove('show'),3000);
}
function applyGeoResult(lat,lng,accuracy,approx){
  const btn=document.getElementById('geo-btn');
  userLocation={lat,lng};
  if(btn){btn.classList.remove('geo-loading','geo-error');btn.classList.add('geo-active');}
  if(userMarker){mainMap.removeLayer(userMarker);}
  if(userAccuracyCircle){mainMap.removeLayer(userAccuracyCircle);}
  const ac=approx?'approx':'';
  const icon=L.divIcon({
    className:'',
    html:`<div class="geo-marker"><div class="geo-marker-pulse ${ac}"></div><div class="geo-marker-pulse2 ${ac}"></div><div class="geo-marker-dot ${ac}"></div></div>`,
    iconSize:[20,20],iconAnchor:[10,10],popupAnchor:[0,-12]
  });
  userMarker=L.marker([lat,lng],{icon,pane:'markerPane',interactive:true})
    .addTo(mainMap).bindPopup(approx?'📍 おおよその現在地（IP推定）':'📍 現在地');
  if(accuracy&&accuracy<50000){
    userAccuracyCircle=L.circle([lat,lng],{
      radius:accuracy,fillColor:'#1565c0',fillOpacity:0.08,color:'#1565c0',weight:1,opacity:0.3,interactive:false
    }).addTo(mainMap);
  }
  if(mainMap.smoothWheelZoom) mainMap.smoothWheelZoom._forceStop();
  mainMap.setView([lat,lng],approx?8:10,{animate:true});
  geoToast(approx?'おおよその現在地から近い順に並べ替えました':'現在地から近い順に並べ替えました');
  applyFilters();
}
function ipGeoFallback(){
  geoToast('IP情報からおおよその位置を取得中…');
  fetch('https://ipapi.co/json/',{signal:AbortSignal.timeout(10000)})
    .then(r=>{if(!r.ok)throw new Error(r.status);return r.json();})
    .then(d=>{
      if(d.latitude&&d.longitude){
        applyGeoResult(d.latitude,d.longitude,null,true);
      } else { throw new Error('no coords'); }
    })
    .catch(e=>{
      console.error('[IP Geolocation fallback]',e);
      const btn=document.getElementById('geo-btn');
      if(btn){btn.classList.remove('geo-loading');btn.classList.add('geo-error');}
      geoToast('位置情報を取得できませんでした');
      setTimeout(()=>{if(btn)btn.classList.remove('geo-error');},6000);
    });
}
function toggleGeoLocation(){
  const btn=document.getElementById('geo-btn');if(!btn)return;
  if(userLocation){
    userLocation=null;
    if(userMarker){mainMap.removeLayer(userMarker);userMarker=null;}
    if(userAccuracyCircle){mainMap.removeLayer(userAccuracyCircle);userAccuracyCircle=null;}
    btn.classList.remove('geo-active');
    geoToast('現在地をOFFにしました');
    applyFilters();
    return;
  }
  if(!navigator.geolocation){geoToast('この端末では位置情報を利用できません');btn.classList.add('geo-error');return;}
  btn.classList.add('geo-loading');
  geoToast('現在地を取得中…');
  navigator.geolocation.getCurrentPosition(pos=>{
    applyGeoResult(pos.coords.latitude,pos.coords.longitude,pos.coords.accuracy,false);
  },err=>{
    console.error('[Geolocation]',err.code,err.message);
    if(err.code===2||err.code===3){
      ipGeoFallback();
    } else {
      btn.classList.remove('geo-loading');btn.classList.add('geo-error');
      geoToast(err.code===1?'位置情報の使用が許可されていません':'位置情報を取得できませんでした');
      setTimeout(()=>btn.classList.remove('geo-error'),6000);
    }
  },{enableHighAccuracy:true,timeout:30000,maximumAge:600000});
}

function parseDurationHours(t){
  if(!t||t==="—") return null;
  if(/泊/.test(t)) return Infinity;
  let m;
  if((m=t.match(/(\d+(?:\.\d+)?)[〜~\-](\d+(?:\.\d+)?)時間/))) return(parseFloat(m[1])+parseFloat(m[2]))/2;
  if((m=t.match(/(\d+(?:\.\d+)?)時間/))) return parseFloat(m[1]);
  if((m=t.match(/(\d+)分[〜~\-](\d+(?:\.\d+)?)時間/))) return(parseInt(m[1])/60+parseFloat(m[2]))/2;
  if((m=t.match(/(\d+)分/))) return parseInt(m[1])/60;
  return null;
}

function getDurationCategory(t){
  const h=parseDurationHours(t);
  if(h===null) return "unknown";
  if(h===Infinity) return "overnight";
  if(h<=2) return "under2h";
  if(h<=5) return "2to5h";
  return "halfday";
}

// ============ TILE LAYERS ============
const TILE_LAYERS={
  terrain:{url:'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',opts:{attribution:'&copy; <a href="https://opentopomap.org">OpenTopoMap</a>',maxZoom:17}},
  standard:{url:'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',opts:{attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',maxZoom:19}},
  satellite:{url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',opts:{attribution:'&copy; Esri',maxZoom:18}}
};
/* transparent label overlay for satellite mode (place names + borders) */
const LABEL_OVERLAY={
  url:'https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png',
  opts:{attribution:'&copy; <a href="https://carto.com/">CARTO</a>',maxZoom:19,subdomains:'abcd',opacity:0.75}
};

function addLayerControl(map){
  const C=L.Control.extend({
    options:{position:'topleft'},
    onAdd:function(){
      const d=L.DomUtil.create('div','gmap-layer-ctrl');
      d.innerHTML='<button class="gmap-layer-btn" data-layer="terrain">🗻 地形</button><button class="gmap-layer-btn" data-layer="standard">🗺️ 地図</button><button class="gmap-layer-btn active" data-layer="satellite">🛰️ 衛星</button>';
      L.DomEvent.disableClickPropagation(d);L.DomEvent.disableScrollPropagation(d);
      let cur=L.tileLayer(TILE_LAYERS.satellite.url,TILE_LAYERS.satellite.opts).addTo(map);
      let labelLayer=L.tileLayer(LABEL_OVERLAY.url,LABEL_OVERLAY.opts).addTo(map);
      let prefBorderLayer=null;
      /* load prefecture borders (TopoJSON → GeoJSON, thin white lines) */
      fetch('https://raw.githubusercontent.com/dataofjapan/land/master/japan.topojson')
        .then(r=>r.json()).then(topo=>{
          const geo=topojson.feature(topo,topo.objects.japan);
          prefBorderLayer=L.geoJSON(geo,{style:{color:'rgba(255,255,255,0.55)',weight:1.5,fill:false},interactive:false}).addTo(map);
        }).catch(()=>{});
      function switchTo(k){
        if(!TILE_LAYERS[k])return;
        d.querySelectorAll('.gmap-layer-btn').forEach(x=>x.classList.remove('active'));
        const ab=d.querySelector(`[data-layer="${k}"]`);if(ab)ab.classList.add('active');
        map.removeLayer(cur);cur=L.tileLayer(TILE_LAYERS[k].url,TILE_LAYERS[k].opts).addTo(map);cur.bringToBack();
        /* satellite: add label + border overlays / others: remove */
        if(k==='satellite'){
          if(!map.hasLayer(labelLayer)){labelLayer=L.tileLayer(LABEL_OVERLAY.url,LABEL_OVERLAY.opts).addTo(map);}
          if(prefBorderLayer&&!map.hasLayer(prefBorderLayer)) prefBorderLayer.addTo(map);
        } else {
          if(map.hasLayer(labelLayer)) map.removeLayer(labelLayer);
          if(prefBorderLayer&&map.hasLayer(prefBorderLayer)) map.removeLayer(prefBorderLayer);
        }
      }
      window._switchTileLayer=switchTo;
      d.addEventListener('click',e=>{
        const b=e.target.closest('.gmap-layer-btn');if(!b)return;
        switchTo(b.dataset.layer);
        /* sync mobile balloon */

// ============ DIFF KEY MAP (for getAllCourses) ============
const DIFF_KEY_MAP={"入門":"entry","初級":"beginner","中級":"intermediate","上級":"advanced","エキスパート":"expert","中級〜上級":"intermediate_advanced","散策":"stroll"};

// ============ getAllCourses ============
function getAllCourses(){
  if(allCoursesCache) return allCoursesCache;
  const all=[],seen=new Set();
  for(const[rk,rv] of Object.entries(mountainDB)){
    for(const lv of["entry","beginner","intermediate","advanced","expert"]){
      const d=rv[lv];if(!d) continue;
      (d.popular||[]).forEach(c=>{if(!c||!c.name)return;if(!seen.has(c.name)){seen.add(c.name);all.push({...c,_category:c.niche?"niche":"popular",_level:lv});}});
      (d.niche||[]).forEach(c=>{if(!c||!c.name)return;if(!seen.has(c.name)){seen.add(c.name);all.push({...c,_category:"niche",_level:lv});}});
    }
  }
  for(const[pref,courses] of Object.entries(prefStrollDB)){
    courses.forEach(c=>{if(!c||!c.name)return;if(!seen.has(c.name)){seen.add(c.name);all.push({...c,pref:pref,_category:"stroll",_level:"stroll"});}});
  }
  allCoursesCache=all;
  return all;
}

// ============ SEARCH ============
function matchesSearch(course,keyword){
  if(!keyword) return true;
  const tokens=keyword.toLowerCase().split(/\s+/).filter(t=>t);
  if(tokens.length===0) return true;
  let searchable=(course.name||'').toLowerCase();
  searchable+=' '+(course.description||'').toLowerCase();
  if(course.pref) searchable+=' '+(Array.isArray(course.pref)?course.pref.join(' '):course.pref).toLowerCase();
  if(course.tags) searchable+=' '+course.tags.map(t=>t.t).join(' ').toLowerCase();
  const hl=COURSE_HIGHLIGHTS[course.name];
  if(hl) searchable+=' '+Object.values(hl).join(' ').toLowerCase();
  return tokens.every(token=>searchable.includes(token));
}

function handleFilter(btn,group){

function applyFilters(){
  if(!markerLayer)return;
  const courses=getAllCourses();
  const{equipment,duration}=activeFilters;
  filteredCourses=[];
  courses.forEach(c=>{
    if(equipment!=="all"&&getEquipmentCategory(c.difficulty)!==equipment) return;
    if(duration!=="all"&&getDurationCategory(c.time)!==duration) return;
    if(searchKeyword&&!matchesSearch(c,searchKeyword)) return;
    filteredCourses.push(c);
  });
  document.getElementById('filter-count').textContent=`${filteredCourses.length} コース表示中`;
  renderCourseList(filteredCourses);
  /* full reset: filter changed so all markers must be re-evaluated */
  resetAllMarkers();
  updateVisibleMarkers();
}

/* pulse markers keyed by course name for differential cleanup */
const seasonPulseMap=new Map();
function resetAllMarkers(){
  markerLayer.clearLayers();if(seasonPulseLayer)seasonPulseLayer.clearLayers();
  courseMarkerMap.clear();seasonPulseMap.clear();
}
/* rebuild a single marker in-place (e.g. after bookmark toggle) */
function rebuildMarker(name){
  if(!markerLayer)return;
  const old=courseMarkerMap.get(name);
  const hadPopup=old&&old.isPopupOpen&&old.isPopupOpen();
  if(old) markerLayer.removeLayer(old);
  courseMarkerMap.delete(name);
  if(seasonPulseMap.has(name)){
    if(seasonPulseLayer) seasonPulseLayer.removeLayer(seasonPulseMap.get(name));
    seasonPulseMap.delete(name);
  }
  const c=filteredCourses.find(x=>x.name===name)||getAllCourses().find(x=>x.name===name);
  if(!c)return;
  const color=EQ_COLORS[getEquipmentCategory(c.difficulty)]||"#c62828";
  const mk=createMarker(c,color);
  markerLayer.addLayer(mk);
  courseMarkerMap.set(name,mk);
  if(hadPopup) mk.openPopup({autoPan:false});
}
function updateVisibleMarkers(){
  if(!markerLayer||!mainMap||sidebarState==='result')return;
  /* Skip heavy marker update while smooth-zooming — will run on wheelEnd */
  if(window._smoothZooming)return;
  const bounds=mainMap.getBounds().pad(0.3);
  /* build set of course names that should be visible */
  const shouldShow=new Set();
  filteredCourses.forEach(c=>{
    const loc=getCourseLocation(c);if(!loc)return;
    if(bounds.contains([loc.lat,loc.lng])) shouldShow.add(c.name);
  });
  /* remove markers that left the viewport (keep popup-open marker) */
  courseMarkerMap.forEach((mk,name)=>{
    if(!shouldShow.has(name)){
      if(mk.isPopupOpen&&mk.isPopupOpen()) return; // keep visible popup
      markerLayer.removeLayer(mk);
      courseMarkerMap.delete(name);
      if(seasonPulseMap.has(name)){
        if(seasonPulseLayer) seasonPulseLayer.removeLayer(seasonPulseMap.get(name));
        seasonPulseMap.delete(name);
      }
    }
  });
  /* add markers that entered the viewport */
  filteredCourses.forEach(c=>{
    if(!shouldShow.has(c.name)) return;
    if(courseMarkerMap.has(c.name)) return; // already on map
    const color=EQ_COLORS[getEquipmentCategory(c.difficulty)]||"#c62828";
    const marker=createMarker(c,color);
    if(!marker) return;
    markerLayer.addLayer(marker);
    courseMarkerMap.set(c.name,marker);
  });
  /* if panToMarker set a pending name, open its popup */
  if(_pendingPopupName){
    const mk=courseMarkerMap.get(_pendingPopupName);
    if(mk){
      const p=mk.getPopup();if(p)p.options.autoPan=false;
      mk.openPopup();_pendingPopupName=null;
    }
  }
}

function createMarker(c,color){
  const loc=getCourseLocation(c);
  if(!loc||!loc.lat||!loc.lng) return null;
  const ss=getSeasonScore(c);
  const isSeason=ss>=2;
  const r=isSeason?7:5;
  const eq=getEquipmentCategory(c.difficulty);
  const catLabel=eq==="casual"?"👟 私服OK":"🥾 登山装備";
  const _hl2=ss===2?getHighlightText(c):null;
  const sl=ss===3?'🔥 今が旬！':(_hl2?'✨ '+_hl2:'');
  const reason=seasonReason(c,ss);
  const prefStr=Array.isArray(c.pref)?c.pref.join('・'):c.pref;
  const searchUrl=`https://www.google.com/search?q=${encodeURIComponent(c.name)}`;
  const desc=c.description||'';
  const nmEsc=c.name.replace(/'/g,"\\'");
  function buildPopupHtml(){
    const bm=isBookmarked(c.name);
    return `<div class="map-popup-title">${course_season_icon(ss)} ${c.name}</div>
    <div class="map-popup-meta">${catLabel}・${c.difficulty}<br>📍 ${prefStr}<br>⏱️ ${c.time}・📏 ${c.elevation}<br>📅 ${c.season}</div>
    ${desc?`<div style="font-size:11px;color:#444;line-height:1.5;margin-top:4px;border-top:1px solid #eee;padding-top:4px">📝 ${desc}</div>`:''}
    ${(sl||reason)?`<div class="map-popup-season">${sl}${reason}</div>`:''}
    <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;align-items:stretch">
      <a href="${searchUrl}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;padding:5px 12px;background:#1a73e8;color:#fff;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;border:1.5px solid #1a73e8;box-sizing:border-box">🔍 詳細を調べる</a>
      <button class="popup-bm-btn${bm?' saved':''}" data-course="${c.name}" onclick="toggleBookmarkFromPopup('${nmEsc}')">${BM_SVG}${bm?' 保存済み':' 保存'}</button>
      <div style="position:relative;margin-left:auto">
        <button class="popup-more-trigger" onclick="this.nextElementSibling.classList.toggle('show')" style="background:none;border:none;cursor:pointer;font-size:16px;color:#999;padding:2px 6px;line-height:1">⋯</button>
        <div class="popup-more-menu" style="display:none;position:absolute;right:0;bottom:100%;margin-bottom:4px;background:#fff;border:1px solid #ddd;border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,.15);white-space:nowrap;z-index:10">
          <a href="javascript:void(0)" onclick="reportWrongLocation('${nmEsc}')" style="display:block;padding:8px 14px;color:#666;font-size:11px;text-decoration:none" onmouseover="this.style.background='#f5f5f5'" onmouseout="this.style.background='none'">📍 位置の間違いを報告</a>
        </div>
      </div>
    </div>`;
  }
  const bm=isBookmarked(c.name);
  let marker;
  if(bm){
    /* bookmarked → bookmark-shaped icon replaces circle */
    const bmDivIcon=L.divIcon({
      className:'bm-marker-icon',
      html:'<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>',
      iconSize:[22,22],iconAnchor:[11,18]
    });
    marker=L.marker([loc.lat,loc.lng],{icon:bmDivIcon}).bindPopup(buildPopupHtml,{maxWidth:260});
  } else {
    marker=L.circleMarker([loc.lat,loc.lng],{
      radius:r,fillColor:color,color:isSeason?'#ff6f00':'#fff',
      weight:isSeason?2:1.5,fillOpacity:0.9,opacity:1
    }).bindPopup(buildPopupHtml,{maxWidth:260});
  }
  if(isSeason){
    const seasonLabel=ss===3?(getHighlightText(c)||'🔥今が旬'):(getHighlightText(c)?'✨'+getHighlightText(c):null);
    if(seasonLabel){
      const ttOff=bm?[0,-6]:[0,-8];
      marker.bindTooltip(seasonLabel,{permanent:true,direction:'top',offset:ttOff,className:'season-tip'});
    }
    /* pulse overlay */
    if(seasonPulseLayer){
      const pulseIcon=L.divIcon({
        className:'season-pulse-wrap',
        html:`<div class="season-pulse-ring ${ss===3?'s3':''}"></div>`,
        iconSize:[14,14],iconAnchor:[7,7]
      });
      const pm=L.marker([loc.lat,loc.lng],{icon:pulseIcon,interactive:false});
      seasonPulseLayer.addLayer(pm);
      seasonPulseMap.set(c.name,pm);
    }
  }
  marker.on('popupopen',()=>highlightCard(c.name));
  marker.on('popupclose',()=>unhighlightCard(c.name));
  return marker;
}

function course_season_icon(ss){return ss===3?'🔥':ss===2?'✨':'';}

function seasonReason(c,ss){
  if(ss===3){const hl=getHighlightText(c);return hl?`<br><span style="color:#e65100;font-weight:600">💡 ${hl}</span>`:''}
  if(ss===2){const hl2=getHighlightText(c);return hl2?`<br><span style="color:#2e7d32;font-weight:600">💡 ${hl2}</span>`:''}
  return '';
}

// ============ BOOKMARKS ============
function getBookmarks(){try{return JSON.parse(localStorage.getItem('bookmarks'))||[];}catch(e){return [];}}
function saveBookmarks(arr){localStorage.setItem('bookmarks',JSON.stringify(arr));}
function isBookmarked(name){return getBookmarks().includes(name);}
function toggleBookmark(name){
  const bm=getBookmarks();
  const idx=bm.indexOf(name);
  if(idx===-1) bm.push(name); else bm.splice(idx,1);
  saveBookmarks(bm);
  /* 1) badge + pulse + panel list — always run regardless of marker rebuild */
  updateBookmarkBadge();
  flashBookmarkButton();
  if(rightPanelOpen) renderRpBookmarks();
  /* 2) marker / popup UI — may trigger popup rebuild, run last */
  try{ updateBookmarkUI(name); }catch(e){ console.warn('updateBookmarkUI error',e); }
}
function flashBookmarkButton(){
  const btn=document.getElementById('map-bm-ctrl');
  if(!btn)return;
  /* double-rAF guarantees the browser has fully removed the old animation
     before re-adding the class, so the pulse plays every single time */
  btn.classList.remove('pulse');
  requestAnimationFrame(()=>{

function getSearchMatchInfo(course){
  if(!searchKeyword) return '';
  const tokens=searchKeyword.toLowerCase().split(/\s+/).filter(t=>t);
  if(!tokens.length) return '';
  const hl=COURSE_HIGHLIGHTS[course.name];
  if(hl){
    const matched=Object.entries(hl)
      .filter(([m,txt])=>tokens.some(t=>txt.toLowerCase().includes(t)))
      .map(([m,txt])=>`${MONTH_NAMES[parseInt(m)]||m+'月'}: ${txt}`);
    if(matched.length) return `<div class="sb-ccard-match">🔍 ${matched.slice(0,2).join(' / ')}</div>`;
  }
  if(course.description){
    const d=course.description.toLowerCase();
    if(tokens.some(t=>d.includes(t))){
      const snip=course.description.length>40?course.description.slice(0,40)+'…':course.description;
      return `<div class="sb-ccard-match">🔍 ${snip}</div>`;
    }
  }
  return '';
}

// ============ MOBILE ============
/* --- Mobile 3-stop sheet: peek (1/3) | half (legacy compat) | full | closed --- */
let sheetStop='peek'; // 'closed','peek','full'
function getSheetStops(){
  const vh=document.documentElement.clientHeight||window.innerHeight;
  const sbH=Math.round(vh*0.9);
  const peekH=Math.round(vh/3);
  return {closed:sbH-48, peek:sbH-peekH, full:0, sbH, vh, peekH};
}
function setSheetPosition(stop,animate){
  const sb=document.getElementById('sidebar');if(!sb)return;
  const s=getSheetStops();
  const ty=stop==='closed'?s.closed:stop==='peek'?s.peek:0;
  sb.style.transition=animate?'transform .35s cubic-bezier(.2,.9,.3,1)':'none';
  sb.style.transform=`translateY(${ty}px)`;
  sheetStop=stop;
  sb.classList.toggle('collapsed',stop==='closed');
  updateFab();
  updateMapControls();
  setTimeout(()=>{if(mainMap)mainMap.invalidateSize();},380);
}
function updateMapControls(){
  if(window.innerWidth>768)return;
  const s=getSheetStops();
  const sheetVisibleH=sheetStop==='closed'?48:sheetStop==='peek'?s.peekH:s.sbH;
  const bottomPx=Math.max(12,sheetVisibleH+16);
  const ctr=document.querySelector('.leaflet-bottom.leaflet-right');
  if(ctr) ctr.style.bottom=sheetStop==='full'?'':bottomPx+'px';
}
function setupMobile(){
  const handle=document.getElementById('drag-handle');
  const sb=document.getElementById('sidebar');
  if(!handle||window.innerWidth>768) return;
  let startY=0,startTy=0,dragging=false,lastY=0,lastTime=0,velocity=0;
  function curTy(){
    const st=getComputedStyle(sb).transform;
    const mx=new DOMMatrix(st==='none'?'':st);return mx.m42||0;
  }
  function onTouchStart(e){
    startY=e.touches[0].clientY;lastY=startY;lastTime=Date.now();velocity=0;
    startTy=curTy();
    sb.style.transition='none';dragging=true;
    const ctr=document.querySelector('.leaflet-bottom.leaflet-right');
    if(ctr)ctr.style.transition='none';
  }
  function onTouchMove(e){
    if(!dragging)return;
    const y=e.touches[0].clientY;
    const now=Date.now();const dt=now-lastTime;
    if(dt>0) velocity=(y-lastY)/dt;
    lastY=y;lastTime=now;
    const dy=y-startY;
    const ny=Math.max(0,Math.min(getSheetStops().closed,startTy+dy));
    sb.style.transform=`translateY(${ny}px)`;
    /* live-update geo control position */
    const sheetTopNow=sb.getBoundingClientRect().top;
    const vh=window.innerHeight;
    const ctr=document.querySelector('.leaflet-bottom.leaflet-right');
    if(ctr) ctr.style.bottom=Math.max(12,vh-sheetTopNow+16)+'px';
  }
  function onTouchEnd(){
    if(!dragging)return;dragging=false;
    const ctr=document.querySelector('.leaflet-bottom.leaflet-right');
    if(ctr)ctr.style.transition='bottom .35s cubic-bezier(.2,.9,.3,1)';
    const s=getSheetStops();
    const nowTy=curTy();
    const VTHRESH=0.35; /* px/ms — light flick threshold */
    let target;
    if(Math.abs(velocity)>VTHRESH){
      /* velocity-based: flick direction decides next stop */
      if(velocity>0){/* swipe down */
        target=sheetStop==='full'?'peek':sheetStop==='peek'?'closed':'closed';
      } else {/* swipe up */
        target=sheetStop==='closed'?'peek':sheetStop==='peek'?'full':'full';
      }
    } else {
      /* position-based: snap to nearest stop */
      const stops=[{k:'full',ty:s.full},{k:'peek',ty:s.peek},{k:'closed',ty:s.closed}];
      target=stops.reduce((a,b)=>Math.abs(nowTy-a.ty)<Math.abs(nowTy-b.ty)?a:b).k;
    }
    setSheetPosition(target,true);
  }
  handle.addEventListener('touchstart',onTouchStart,{passive:true});
  handle.addEventListener('touchmove',onTouchMove,{passive:true});
  handle.addEventListener('touchend',onTouchEnd);
  handle.addEventListener('click',()=>{
    if(sheetStop==='closed') setSheetPosition('peek',true);
    else if(sheetStop==='peek') setSheetPosition('full',true);
  });
  /* build map preset bar */
  buildMapPresetBar();
  /* initial position: peek (1/3) */
  requestAnimationFrame(()=>setSheetPosition('peek',false));
}

          resetBtn.style.display='';resetBtn.classList.add('show');
        }
        applyFilters();
      });
      subRow.appendChild(s);

// ============ PREF / NEARBY LOGIC ============
function matchPref(course,pref){
  if(Array.isArray(course.pref)) return course.pref.includes(pref);
  return course.pref===pref;
}
function dedup(arr){const seen=new Set();return arr.filter(c=>{if(seen.has(c.name))return false;seen.add(c.name);return true;});}

function getNearbyPrefExtras(pref,level){
  const adjPrefs=PREF_ADJACENT[pref]||[];
  let extras=[];
  adjPrefs.forEach(ap=>{
    for(const[rk,rv] of Object.entries(mountainDB)){
      const d=rv[level];if(!d) continue;
      const all=[...(d.popular||[]),...(d.niche||[])].filter(c=>c&&c.name&&matchPref(c,ap));
      if(all.length>0){const pick=all[Math.floor(Math.random()*all.length)];extras.push({...pick,_fromPref:ap});}
    }
  });
  adjPrefs.forEach(ap=>{
    const s=(prefStrollDB[ap]||[]).filter(c=>c&&c.name);
    if(s.length>0){const pick=s[Math.floor(Math.random()*s.length)];extras.push({...pick,_fromPref:ap});}
  });
  return dedup(extras).slice(0,6);
}

function renderCard(c,color){
  if(!c||!c.name) return '';
  const eqCat=getEquipmentCategory(c.difficulty||'散策');
  const headerColor=eqCat==="casual"?"linear-gradient(135deg,#00796b,#26a69a)":"linear-gradient(135deg,#b71c1c,#c62828)";
  const badge=eqCat==="casual"?'<span class="stroll-b">👟 私服OK</span>':'<span class="niche-b">🥾 登山装備</span>';
  const ss=getSeasonScore(c);
  const hl=getHighlightText(c);
  let siHtml='';
  if(ss===3) siHtml=`<div class="season-indicator"><span class="si-badge si-highlight">🔥 今が旬！</span><span class="highlight-text">${hl}</span></div>`;
  else if(ss===2&&hl) siHtml=`<div class="season-indicator"><span class="si-badge si-best">✨ ${hl}</span></div>`;
  const nm=c.name.replace(/'/g,"\\'");
  const tags=Array.isArray(c.tags)?c.tags:[];
  return `<div class="card" onclick="panToMarker('${nm}')">
    <div class="card-h" style="background:${headerColor}">
      <h3>${c.name}${badge}${ss===3?'<span class="now-tag">NOW</span>':''}</h3>
      <span class="diff-tag">${c.difficulty||''}</span>
    </div>
    <div class="card-b">

      <div class="c-tags">${tags.map(t=>`<span class="tag ${t.c}">${t.t}</span>`).join("")}</div>

      ${c.tips?`<div class="c-tips"><strong>💡 ツウ情報：</strong>${c.tips}</div>`:''}

}

/* ---------- BUILD COURSE CONTEXT ---------- */
function buildCourseContext(question){
  const all=getAllCourses();
  const q=question.toLowerCase();
  /* extract prefectures mentioned */
  const allPrefs=Object.values(REGIONS).flatMap(r=>r.prefs);
  const mentionedPrefs=allPrefs.filter(p=>q.includes(p.replace(/[都府県]/g,'')));
  /* extract level keywords */
  const levelKw={entry:['入門','初心者','ビギナー','初めて'],beginner:['初級','ライト'],intermediate:['中級'],advanced:['上級','本格'],expert:['エキスパート','上級者']};
  let mentionedLevels=[];
  for(const[lv,kws] of Object.entries(levelKw)){
    if(kws.some(k=>q.includes(k))) mentionedLevels.push(lv);
  }
  /* extract time keywords */
  let timeFilter=null;
  if(q.includes('短時間')||q.includes('1時間')||q.includes('2時間')||q.includes('さくっと')) timeFilter='short';
  if(q.includes('半日')||q.includes('日帰り')) timeFilter='halfday';
  if(q.includes('1泊')||q.includes('泊まり')||q.includes('縦走')) timeFilter='overnight';
  /* extract season/month keywords */
  let seasonFilter=null;
  const monthNames=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  monthNames.forEach((mn,i)=>{if(q.includes(mn)) seasonFilter=i+1;});
  if(q.includes('今月')||q.includes('今週')||q.includes('見頃')) seasonFilter=getCurrentMonth();
  if(q.includes('春')) seasonFilter=4;
  if(q.includes('夏')) seasonFilter=7;
  if(q.includes('秋')) seasonFilter=10;
  if(q.includes('冬')) seasonFilter=1;
  /* equipment keywords */
  let eqFilter=null;
  if(q.includes('私服')||q.includes('スニーカー')||q.includes('散策')||q.includes('気軽')||q.includes('子連れ')||q.includes('家族')) eqFilter='casual';
  if(q.includes('登山装備')||q.includes('本格')) eqFilter='hiking';
  /* other keywords */
  const otherKws=['温泉','紅葉','桜','花','展望','絶景','富士','海','滝','森林','パワースポット','歴史','寺','神社'];
  const matchedKws=otherKws.filter(k=>q.includes(k));
  /* filter courses */
  let filtered=all;
  if(mentionedPrefs.length>0){
    const prefSet=new Set(mentionedPrefs);
    filtered=filtered.filter(c=>{
      const cp=c.pref||'';
      return prefSet.has(cp)||mentionedPrefs.some(p=>cp.includes(p.replace(/[都府県]/g,'')));
    });
  }
  if(mentionedLevels.length>0){
    filtered=filtered.filter(c=>mentionedLevels.includes(c._level));
  }
  if(eqFilter){
    filtered=filtered.filter(c=>getEquipmentCategory(c.difficulty||'散策')===eqFilter);
  }
  if(timeFilter==='short'){
    filtered=filtered.filter(c=>{const t=c.time||'';return t.includes('1時間')||t.includes('2時間')||t.includes('1.5');});
  }
  if(seasonFilter){
    filtered=filtered.filter(c=>{
      const months=parseSeasonMonths(c.season||'');
      return months.includes(seasonFilter);
    });
  }
  if(matchedKws.length>0){
    const kFiltered=filtered.filter(c=>{
      const haystack=((c.description||'')+(c.name||'')+(c.tags||[]).map(t=>t.t).join(' ')).toLowerCase();
      return matchedKws.some(k=>haystack.includes(k));
    });
    if(kFiltered.length>=3) filtered=kFiltered;
  }
  /* if too few results and prefecture filter active, relax to adjacent */
  if(filtered.length<5&&mentionedPrefs.length>0){
    const adjPrefs=new Set(mentionedPrefs);
    mentionedPrefs.forEach(p=>{(PREF_ADJACENT[p]||[]).forEach(a=>adjPrefs.add(a));});
    const extra=all.filter(c=>{
      const cp=c.pref||'';
      return !mentionedPrefs.some(p=>cp.includes(p.replace(/[都府県]/g,'')))&&
             [...adjPrefs].some(p=>cp.includes(p.replace(/[都府県]/g,'')));
    });
    filtered=[...filtered,...extra.slice(0,15)];
  }
  /* if still empty, fall back to season-scored top courses */
  if(filtered.length===0){
    filtered=all.slice().sort((a,b)=>getSeasonScore(b)-getSeasonScore(a)).slice(0,30);
  }
  /* cap at 20 courses, sort by season score */
  filtered.sort((a,b)=>getSeasonScore(b)-getSeasonScore(a));
  if(filtered.length>20) filtered=filtered.slice(0,20);
  /* format ultra-compact (minimize tokens) */
  const lines=filtered.map(c=>{
    const ss=getSeasonScore(c);
    const ssLabel=['','△','○','◎'][ss]||'';
    const eq=getEquipmentCategory(c.difficulty||'散策');
    return `【${c.name}】${c.pref||''}|${c.difficulty||''}|${c.time}|${c.season}|${eq==='casual'?'私服':'装備'}|${ssLabel}`;
  });
  return {courseText:lines.join('\n'),count:filtered.length,courses:filtered};
}

/* ---------- SYSTEM PROMPT ---------- */
function buildSystemPrompt(courseCtx){
  const month=getCurrentMonth();
  const monthName=MONTH_NAMES[month];
  return `ハイキング・散策AIガイド。今月は${monthName}。日本語で回答。
ルール: コース名は必ず【】で囲む。3〜5件に絞り簡潔に紹介。◎のコースを優先。下記データにないコースは紹介禁止。150字以内で簡潔に。
データ(名前|県|難易度|時間|季節|装備|今月):
${courseCtx.courseText}`;
}

/* ---------- CALL GEMINI API ---------- */
async function callGemini(userMsg){
  const key=getGeminiKey();
  if(!key) throw new Error('API_KEY_MISSING');
  const model=getGeminiModel();
  const courseCtx=buildCourseContext(userMsg);
  /* add user message to conversation */
  aiConversation.push({role:'user',parts:[{text:userMsg}]});
  /* keep conversation short (last 4 turns) */
  if(aiConversation.length>8) aiConversation=aiConversation.slice(-8);
  const url=`${GEMINI_API_BASE}${model}:generateContent?key=${key}`;
  const body={
    system_instruction:{parts:[{text:buildSystemPrompt(courseCtx)}]},
    contents:aiConversation,
    generationConfig:{temperature:0.7,maxOutputTokens:512,topP:0.9}
  };
  const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!res.ok){
    const err=await res.json().catch(()=>({}));
    const rawMsg=err?.error?.message||'';
    /* user-friendly quota error */
    if(res.status===429||rawMsg.includes('quota')||rawMsg.includes('Quota')){
      throw new Error('QUOTA_EXCEEDED');
    }
    throw new Error(rawMsg||`HTTP ${res.status}`);
  }
  const data=await res.json();
  const text=data?.candidates?.[0]?.content?.parts?.[0]?.text||'回答を生成できませんでした。';
  /* add assistant reply to conversation */
  aiConversation.push({role:'model',parts:[{text}]});
  return {text,courses:courseCtx.courses};
}

/* ---------- FORMAT AI RESPONSE (make course names clickable) ---------- */
function formatAiResponse(text){
  /* escape html */
  let html=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  /* convert 【courseName】 to clickable link */
  const allCourses=getAllCourses();
  const nameSet=new Set(allCourses.map(c=>c.name));
  html=html.replace(/【([^】]+)】/g,(m,name)=>{
    if(nameSet.has(name)){
      const escaped=name.replace(/'/g,"\\'");
      return `<span class="ai-course-link" onclick="aiCourseLinkClick('${escaped}')">📍${name}</span>`;
    }
    return `<strong>${name}</strong>`;
  });
  /* convert newlines to <br> */
  html=html.replace(/\n/g,'<br>');
  return html;
}

/* ---------- SEND MESSAGE ---------- */
async function sendAiMessage(){
  if(aiSending) return;
  const input=document.getElementById('ai-input');
  const msg=input.value.trim();
  if(!msg) return;
  if(!getGeminiKey()){showAiKeyDialog();return;}
  input.value='';
  appendAiMsg('user',msg);
  aiSending=true;
  document.getElementById('ai-send-btn').disabled=true;
  showAiLoading();
  try{
    const result=await callGemini(msg);
    hideAiLoading();
    appendAiMsg('ai',result.text);
  }catch(e){
    hideAiLoading();
    if(e.message==='API_KEY_MISSING'){
      appendAiMsg('system','⚠️ API キーが設定されていません');
      showAiKeyDialog();
    } else if(e.message==='QUOTA_EXCEEDED'){
      appendAiMsg('system','⚠️ API の無料枠を超過しました。\n① 少し待ってから再試行\n② ⚙️ からモデルを「Flash Lite」に変更\n③ 個人 Google アカウントで API キーを再発行');
    } else {
      appendAiMsg('system','⚠️ エラー: '+e.message);
    }
    /* remove failed user message from conversation */
    if(aiConversation.length&&aiConversation[aiConversation.length-1].role==='user'){
      aiConversation.pop();
    }
  }finally{
    aiSending=false;
    document.getElementById('ai-send-btn').disabled=false;
  }
}
